<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde2c4"/>
      <stop offset="60%" stop-color="#f5a78a"/>
      <stop offset="100%" stop-color="#e35d4f"/>
    </linearGradient>
    <linearGradient id="catBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2520"/>
      <stop offset="100%" stop-color="#0f0c08"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="230" fill="url(#bg)"/>

  <!-- Soft highlight at top -->
  <ellipse cx="380" cy="220" rx="320" ry="120" fill="#fff" opacity="0.18"/>

  <!-- Cat (head + ears) -->
  <g filter="url(#shadow)">
    <!-- Left ear -->
    <path d="M 268 392 L 256 222 Q 252 200 274 210 L 432 312 Z" fill="url(#catBody)"/>
    <!-- Right ear -->
    <path d="M 756 392 L 768 222 Q 772 200 750 210 L 592 312 Z" fill="url(#catBody)"/>
    <!-- Inner left ear -->
    <path d="M 296 350 L 290 250 L 392 318 Z" fill="#e35d4f" opacity="0.85"/>
    <!-- Inner right ear -->
    <path d="M 728 350 L 734 250 L 632 318 Z" fill="#e35d4f" opacity="0.85"/>
    <!-- Head -->
    <ellipse cx="512" cy="560" rx="270" ry="248" fill="url(#catBody)"/>
  </g>

  <!-- Eyes (slightly closed, content) -->
  <ellipse cx="420" cy="520" rx="34" ry="44" fill="#fff"/>
  <ellipse cx="604" cy="520" rx="34" ry="44" fill="#fff"/>
  <ellipse cx="420" cy="528" rx="18" ry="30" fill="#0f0c08"/>
  <ellipse cx="604" cy="528" rx="18" ry="30" fill="#0f0c08"/>
  <circle cx="426" cy="514" r="6" fill="#fff"/>
  <circle cx="610" cy="514" r="6" fill="#fff"/>

  <!-- Nose -->
  <path d="M 488 612 Q 512 600 536 612 Q 528 642 512 642 Q 496 642 488 612 Z" fill="#ff8aa0"/>

  <!-- Mouth smile -->
  <path d="M 470 680 Q 491 712 512 690 Q 533 712 554 680" stroke="#fff" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.85"/>

  <!-- Whiskers -->
  <g stroke="#fff" stroke-width="5" stroke-linecap="round" opacity="0.55">
    <line x1="290" y1="600" x2="380" y2="608"/>
    <line x1="290" y1="640" x2="380" y2="640"/>
    <line x1="290" y1="680" x2="380" y2="672"/>
    <line x1="644" y1="608" x2="734" y2="600"/>
    <line x1="644" y1="640" x2="734" y2="640"/>
    <line x1="644" y1="672" x2="734" y2="680"/>
  </g>

  <!-- Speech bubble badge (bottom-right) -->
  <g filter="url(#shadow)">
    <circle cx="820" cy="820" r="78" fill="#fff"/>
    <circle cx="788" cy="820" r="9" fill="#e35d4f"/>
    <circle cx="820" cy="820" r="9" fill="#e35d4f"/>
    <circle cx="852" cy="820" r="9" fill="#e35d4f"/>
  </g>
</svg>
